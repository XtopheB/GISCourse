<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>France — Population by Département</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f7f4;color:#2c2c2a;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:12px 20px 10px;border-bottom:1px solid #e0ddd8;background:#fff;display:flex;align-items:baseline;gap:12px;flex-shrink:0}
header h1{font-size:15px;font-weight:600;color:#1a1a18}
header span{font-size:12px;color:#888780}
#main{display:grid;grid-template-columns:1fr 300px;flex:1;overflow:hidden}
#mapcol{background:#e8f3f8;position:relative;overflow:hidden}
#map{width:100%;height:100%;display:block}
#sidebar{background:#fff;border-left:1px solid #e0ddd8;display:flex;flex-direction:column;padding:14px;gap:11px;overflow-y:auto}
.slabel{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#888780;margin-bottom:5px}
.tabs{display:flex;flex-wrap:wrap;gap:3px}
.tab{font-size:11px;padding:3px 9px;border-radius:14px;border:1px solid #d3d1c7;background:transparent;color:#5f5e5a;cursor:pointer;line-height:1.7;transition:all .12s}
.tab:hover{background:#f1efe8}
.tab.on{background:#2c2c2a;color:#fff;border-color:#2c2c2a}
.nrow{display:flex;align-items:center;gap:8px;font-size:12px;color:#888780}
#nv{font-weight:600;color:#2c2c2a;min-width:12px}
input[type=range]{flex:1;accent-color:#2c2c2a}
.box{border:1px solid #e0ddd8;border-radius:8px;padding:10px;background:#faf9f7}
.info{font-size:11px;color:#73726c;padding:6px 9px;background:#f1efe8;border-radius:6px;min-height:28px;line-height:1.5}
/* horizontal legend */
#legbar-wrap{display:flex;flex-direction:column;gap:4px}
#legbar{height:14px;border-radius:3px;width:100%;display:flex;overflow:hidden}
.legbar-seg{flex:1;transition:opacity .2s}
#legticks{display:flex;justify-content:space-between;font-size:10px;color:#888780}
/* histogram */
#hist-wrap{height:110px;position:relative;margin-top:6px}
/* tooltip */
#tooltip{position:fixed;background:rgba(255,255,255,.97);border:1px solid #d3d1c7;border-radius:7px;padding:7px 11px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .1s;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.1)}
#tooltip b{font-size:13px;font-weight:600;display:block;color:#1a1a18}
#tooltip span{color:#73726c}
</style>
</head>

<header>
  <h1>France — Population by Département</h1>
  <span>INSEE 2023 · 96 metropolitan departments</span>
</header>
<div id="main">

  <div id="sidebar">
    <div>
      <div class="slabel">Classification method</div>
      <div class="tabs">
        <button class="tab on" data-m="equal">Equal interval</button>
        <button class="tab" data-m="quantile">Quantile</button>
        <button class="tab" data-m="jenks">Jenks</button>
        <button class="tab" data-m="sd">Std deviation</button>
        <button class="tab" data-m="log">Logarithmic</button>
        <button class="tab" data-m="head">Head/Tails</button>
      </div>
    </div>
    <div class="nrow">
      <span>Classes</span>
      <input type="range" id="ns" min="3" max="8" value="5" step="1">
      <span id="nv">5</span>
    </div>

    <div class="box">
      <div class="slabel">Legend</div>
      <!-- Horizontal color bar -->
      <div id="legbar-wrap">
        <div id="legbar"></div>
        <div id="legticks"></div>
      </div>
    </div>

    <div class="box">
      <div class="slabel">Population distribution</div>
      <div id="hist-wrap">
        <canvas id="hc" role="img" aria-label="Histogram of department populations"></canvas>
      </div>
    </div>

    <div class="info" id="info">Hover a department for details.</div>
  </div>
</div>

const fmt=v=>v>=1e6?(v/1e6).toFixed(2)+'M':v>=1e3?Math.round(v/1e3)+'k':String(v);
const fmt2=v=>v.toLocaleString('en-GB');
const vals=Object.values(POP);

let method='equal',nC=5,breaks=[],colors=[],dCol={},dCls={},hChart=null;

function jenks(data,k){
  const s=data.slice().sort((a,b)=>a-b),n=s.length;
  const mat=Array.from({length:n+1},()=>new Array(k+1).fill(0));
  const v=Array.from({length:n+1},()=>new Array(k+1).fill(Infinity));
  for(let i=1;i<=k;i++){mat[1][i]=1;v[1][i]=0;}
  for(let l=2;l<=n;l++){
    let s1=0,s2=0,w=0;
    for(let m=1;m<=l;m++){
      const i3=l-m+1,val=s[i3-1];s2+=val*val;s1+=val;w++;
      const v1=s2-s1*s1/w,i4=i3-1;
      if(i4!==0)for(let j=2;j<=k;j++)if(v[l][j]>=v1+v[i4][j-1]){mat[l][j]=i3;v[l][j]=v1+v[i4][j-1];}
    }
    mat[l][1]=1;v[l][1]=s2-s1*s1/w;
  }
  const kc=new Array(k+1).fill(0);kc[k]=s[n-1];kc[0]=s[0];
  let cn=k,id=n;while(cn>=2){kc[cn-1]=s[mat[id][cn]-2];id=mat[id][cn]-1;cn--;}
  return kc;
}

function getBreaks(k,m){
  const s=vals.slice().sort((a,b)=>a-b),mn=s[0],mx=s[s.length-1];
  if(m==='equal'){const st=(mx-mn)/k;return Array.from({length:k+1},(_,i)=>mn+i*st);}
  if(m==='quantile'){const b=[mn];for(let i=1;i<k;i++)b.push(d3.quantile(s,i/k));b.push(mx);return b;}
  if(m==='jenks')return jenks(vals,k);
  if(m==='sd'){const mu=d3.mean(vals),sd=d3.deviation(vals);const b=[mn];const st=mu-Math.floor(k/2)*sd;for(let i=0;i<=k;i++){const vv=st+i*sd;if(vv>mn&&vv<mx)b.push(vv);}b.push(mx);return[...new Set(b)].sort((a,b)=>a-b);}
  if(m==='log'){const lmn=Math.log10(mn+1),lmx=Math.log10(mx+1),st=(lmx-lmn)/k;return Array.from({length:k+1},(_,i)=>Math.pow(10,lmn+i*st)-1);}
  if(m==='head'){const b=[mn];let sub=s.slice();for(let i=0;i<k-1;i++){const mu=d3.mean(sub);b.push(mu);sub=sub.filter(vv=>vv>mu);if(!sub.length)break;}b.push(mx);return[...new Set(b)].sort((a,b)=>a-b);}
  return[mn,mx];
}

function cls(v,br){for(let i=0;i<br.length-1;i++)if(v<=br[i+1])return i;return br.length-2;}

function render(){
  breaks=getBreaks(nC,method);
  const n=breaks.length-1;
  colors=Array.from({length:n},(_,i)=>d3.interpolateYlGnBu((i+0.5)/n));
  dCol={};dCls={};
  for(const[code,pop]of Object.entries(POP)){const ci=Math.min(cls(pop,breaks),n-1);dCol[code]=colors[ci];dCls[code]=ci;}
  d3.selectAll('#map path.dep').attr('fill',d=>dCol[d.properties.code]||'#ccc');
  renderLegBar(n);
  renderHist();
}

function renderLegBar(n){
  // Horizontal gradient bar with proportional segments
  const mn=breaks[0],mx=breaks[breaks.length-1],total=mx-mn;
  const bar=document.getElementById('legbar');
  const ticks=document.getElementById('legticks');
  bar.innerHTML='';ticks.innerHTML='';

  for(let i=0;i<n;i++){
    const seg=document.createElement('div');
    seg.className='legbar-seg';
    const w=((breaks[i+1]-breaks[i])/total*100).toFixed(2)+'%';
    const cnt=Object.entries(POP).filter(([,p])=>cls(p,breaks)===i).length;
    seg.style.background=colors[i];
    seg.style.flex=`0 0 ${w}`;
    seg.title=`${fmt(Math.round(breaks[i]))} – ${fmt(Math.round(breaks[i+1]))} (${cnt} dep.)`;
    bar.appendChild(seg);
  }

  // Tick labels: show break values below bar
  for(let i=0;i<=n;i++){
    const tick=document.createElement('span');
    tick.textContent=fmt(Math.round(breaks[i]));
    if(i===0) tick.style.textAlign='left';
    else if(i===n) tick.style.textAlign='right';
    else {
      tick.style.position='absolute';
      const pct=((breaks[i]-mn)/total*100).toFixed(2);
      tick.style.left=pct+'%';
      tick.style.transform='translateX(-50%)';
    }
    ticks.appendChild(tick);
  }
  ticks.style.position='relative';
  ticks.style.display='flex';
  if(n<=4){
    ticks.style.justifyContent='space-between';
    ticks.querySelectorAll('span').forEach(s=>{s.style.position='';s.style.left='';s.style.transform='';});
  }
}

function renderHist(){
  const mn=breaks[0],mx=breaks[breaks.length-1],bins=20,bw=(mx-mn)/bins;
  const labels=[],cnts=new Array(bins).fill(0),bg=[];
  vals.forEach(v=>{const bi=Math.min(Math.floor((v-mn)/bw),bins-1);cnts[bi]++;});
  for(let i=0;i<bins;i++){
    labels.push(fmt(Math.round(mn+(i+0.5)*bw)));
    bg.push(colors[Math.min(cls(mn+(i+0.5)*bw,breaks),colors.length-1)]);
  }
  if(hChart){hChart.destroy();hChart=null;}
  hChart=new Chart(document.getElementById('hc'),{
    type:'bar',
    data:{labels,datasets:[{data:cnts,backgroundColor:bg,borderWidth:0,borderRadius:2,categoryPercentage:.95,barPercentage:.95}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:it=>{const i=it[0].dataIndex;return fmt2(Math.round(mn+i*bw))+' – '+fmt2(Math.round(mn+(i+1)*bw));},
        label:it=>it.raw+' dept'+(it.raw>1?'s':'')
      }}},
      scales:{
        x:{ticks:{display:false},grid:{display:false},border:{display:false}},
        y:{ticks:{color:'#888780',font:{size:10},maxTicksLimit:4},grid:{color:'rgba(0,0,0,.05)'},border:{display:false}}
      }
    }
  });
}

// Build D3 map from embedded GeoJSON
(function(){
  const svg=d3.select('#map');
  const el=document.getElementById('mapcol');
  const W=el.clientWidth||700,H=el.clientHeight||520;
  svg.attr('viewBox',`0 0 ${W} ${H}`);

  const proj=d3.geoConicConformal()
    .center([2.454,46.28])
    .scale(Math.min(W,H)*4.8)
    .translate([W/2,H/2]);
  const path=d3.geoPath(proj);

  const features=GJ.features.filter(f=>{
    const c=f.properties.code||'';
    return c&&!/^97/.test(c);
  });

  svg.selectAll('path.dep').data(features).join('path')
    .attr('class','dep')
    .attr('d',path)
    .attr('stroke','white')
    .attr('stroke-width','0.5')
    .style('cursor','pointer')
    .on('mousemove',function(ev,d){
      const code=d.properties.code;
      const nom=d.properties.nom||code;
      const pop=POP[code]||0;
      const ci=dCls[code]??0;
      const n=breaks.length-1;
      document.getElementById('info').innerHTML=
        `<b>${nom}</b> (${code}) · ${fmt2(pop)} inhabitants · class ${ci+1} of ${n}`;
      const tt=document.getElementById('tooltip');
      document.getElementById('tt-name').textContent=`${nom} (${code})`;
      document.getElementById('tt-body').textContent=` · ${fmt2(pop)} inhab. · class ${ci+1}`;
      tt.style.left=(ev.clientX+14)+'px';
      tt.style.top=(ev.clientY-30)+'px';
      tt.style.opacity='1';
    })
    .on('mouseleave',function(){
      document.getElementById('tooltip').style.opacity='0';
      document.getElementById('info').textContent='Hover a department for details.';
    });

  render();

  window.addEventListener('resize',()=>{
    const W2=el.clientWidth,H2=el.clientHeight;
    svg.attr('viewBox',`0 0 ${W2} ${H2}`);
    proj.scale(Math.min(W2,H2)*4.8).translate([W2/2,H2/2]);
    svg.selectAll('path.dep').attr('d',path);
  });
})();

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',function(){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  this.classList.add('on');
  method=this.dataset.m;
  render();
}));
document.getElementById('ns').addEventListener('input',function(){
  nC=+this.value;
  document.getElementById('nv').textContent=nC;
  render();
});
</script>
